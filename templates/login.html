<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - PYNAS</title>
    <link rel="icon" href="/static/logo_grey.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-image: url('/background');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.18);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        .logo {
            font-size: 36px;
            font-weight: bold;
            color: #333;
            margin-bottom: 30px;
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .form-group {
            text-align: left;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 1px solid white;
            border-radius: 8px;
            font-size: 16px;
            background-color: white;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #00a2ff;
            box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
        }
        
        .submit-btn {
            background-color: #00a2ff;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        
        .submit-btn:hover {
            background-color: #00a2ff;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo"><img src="/static/logo_white.png" alt="PYNAS" style="width: 120px;"></div>
        <form class="login-form" action="/login" method="post">
            <div class="form-group">
                <input type="text" id="username" name="username" placeholder="账号" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" name="password" placeholder="密码" required>
            </div>
            <label style="color: red;">{{ error }}</label>
            <button type="submit" class="submit-btn">登录</button>
        </form>
    </div>
</body>
</html>
